<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - QR Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
  font-family:'Roboto',sans-serif;
  background:#0F172A;
  color:#F8FAFC;
  padding:30px;
  margin:0;
}

h1{
  font-family:'Orbitron';

}

#loginBox button{
  margin-top:10px;

  color:white;
  border:none;
  cursor:pointer;
}

.container{
  background:#1E293B;
  padding:25px;

}

input{

  border-radius:6px;
  border:1px solid #334155;
  background:#0F172A;

}

button{

</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginBox">
  <h1>Admin Login</h1>
  <input id="loginEmail" type="email" placeholder="Email"><br>
  <input id="loginPassword" type="password" placeholder="Password"><br>
  <button onclick="loginWithEmail()">Login</button>
  <p id="loginMsg"></p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none">

<h1>Admin Panel</h1>
<button class="logout" onclick="logout()">Logout</button>

<!-- REGISTER STUDENT -->
<div class="container">
<h2>Register Student</h2>
<input id="studentID" placeholder="Student ID"><br>
<input id="name" placeholder="Full Name"><br>
<input id="course" placeholder="Course"><br>
<input id="section" placeholder="Year / Section"><br>
<input id="campus" placeholder="Campus"><br>
<input id="email" placeholder="Email"><br>
<button onclick="registerStudent()">Register Student</button>
<p id="message"></p>
</div>

<!-- STUDENT TABLE -->
<div class="container">
<h2>Students</h2>

<button onclick="toggleStudents()" id="toggleBtn">Hide Students</button>
<br><br>

<input id="searchCampus" placeholder="Search Campus (Example: LASAM)">
<button onclick="searchCampus()">Search</button>
<button onclick="loadStudents()">Show All</button>

<div id="studentsContainer">
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Section</th>
<th>Campus</th>
<th>QR</th>
</tr>
</thead>
<tbody id="studentTable"></tbody>
</table>
</div>

</div>

<!-- ATTENDANCE TABLE -->
<div class="container">
<h2>Attendance Records</h2>
<button class="export" onclick="exportExcel()">Export to Excel</button>

<h3>Morning Attendance</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Section</th>
<th>Campus</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody id="morningAttendanceTable"></tbody>
</table>

<h3>Afternoon Attendance</h3>
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Section</th>
<th>Campus</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>
<tbody id="afternoonAttendanceTable"></tbody>
</table>
</div>

<script>
const ADMIN_EMAIL = "kenn04@gmail.com";

/* FIREBASE CONFIG */
var firebaseConfig = {
  apiKey: "AIzaSyCD-nMiz8I7rbneRDTjPzt3WNbigvV2xDQ",
  authDomain: "attsheet-f23a7.firebaseapp.com",
  projectId: "attsheet-f23a7",
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

/* SHOW ADMIN PANEL */
function showAdmin(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("adminPanel").style.display="block";
}

/* LOGIN */
function loginWithEmail(){
  var email = document.getElementById("loginEmail").value;
  var password = document.getElementById("loginPassword").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
  .then((userCredential)=>{
    var user = userCredential.user;

    if(user.email !== ADMIN_EMAIL){
      firebase.auth().signOut();
      document.getElementById("loginMsg").innerHTML = "Access Denied";
      return;
    }

    showAdmin();
  })
  .catch((error)=>{
    document.getElementById("loginMsg").innerHTML = error.message;
  });
}

firebase.auth().onAuthStateChanged(function(user){
  if(user && user.email === ADMIN_EMAIL){
    showAdmin();
  }
});

/* LOGOUT */
function logout(){
  firebase.auth().signOut();
  location.reload();
}

/* REGISTER STUDENT */
function registerStudent(){

  var studentID=document.getElementById("studentID").value;
  var name=document.getElementById("name").value;
  var course=document.getElementById("course").value;
  var section=document.getElementById("section").value;
  var campus=document.getElementById("campus").value;
  var email=document.getElementById("email").value;

  db.collection("students").add({
    studentID,name,course,section,campus,email
  })
  .then(()=>{
    document.getElementById("message").innerHTML="Student Registered";
    loadStudents();
  });
}

/* LOAD ALL STUDENTS */
function loadStudents(){

  db.collection("students").get().then(function(snapshot){

    var table="";

    snapshot.forEach(function(doc){

      var data=doc.data();

      table+=`<tr>
      <td>${data.studentID}</td>
      <td>${data.name}</td>
      <td>${data.course}</td>
      <td>${data.section}</td>
      <td>${data.campus}</td>
      <td><div id="qr${data.studentID}"></div></td>
      </tr>`;

    });

    document.getElementById("studentTable").innerHTML=table;

    snapshot.forEach(function(doc){

      var data=doc.data();

      new QRCode(document.getElementById("qr"+data.studentID),{
        text:data.studentID,
        width:80,
        height:80
      });

    });

  });

}

loadStudents();

/* SEARCH CAMPUS */
function searchCampus(){

  var campus=document.getElementById("searchCampus").value;

  db.collection("students")
  .where("campus","==",campus)
  .get()
  .then(function(snapshot){

    var table="";

    snapshot.forEach(function(doc){

      var data=doc.data();

      table+=`<tr>
      <td>${data.studentID}</td>
      <td>${data.name}</td>
      <td>${data.course}</td>
      <td>${data.section}</td>
      <td>${data.campus}</td>
      <td><div id="qr${data.studentID}"></div></td>
      </tr>`;

    });

    document.getElementById("studentTable").innerHTML=table;

    snapshot.forEach(function(doc){

      var data=doc.data();

      new QRCode(document.getElementById("qr"+data.studentID),{
        text:data.studentID,
        width:80,
        height:80
      });

    });

  });

}

/* COLLAPSE STUDENTS TABLE */
let studentsVisible = true;

function toggleStudents(){

  const container = document.getElementById("studentsContainer");
  const button = document.getElementById("toggleBtn");

  if(studentsVisible){
    container.style.display="none";
    button.innerText="Show Students";
    studentsVisible=false;
  }else{
    container.style.display="block";
    button.innerText="Hide Students";
    studentsVisible=true;
  }

}

/* EXPORT EXCEL */
function exportExcel(){

  db.collection("attendance").get().then(function(snapshot){

    var data=[];

    snapshot.forEach(function(doc){

      let d=doc.data();

      data.push({
        StudentID:d.studentID,
        Name:d.name,
        Section:d.section,
        Campus:d.campus,
        Date:d.date,
        Time:d.time,
        Status:d.status
      });

    });

    var worksheet=XLSX.utils.json_to_sheet(data);
    var workbook=XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(workbook,worksheet,"Attendance");

    XLSX.writeFile(workbook,"Attendance_Report.xlsx");

  });

}
</script>
</body>
</html>
