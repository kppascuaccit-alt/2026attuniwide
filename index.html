<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel - QR Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

/* ---------- BODY ---------- */

body{
font-family:'Roboto',sans-serif;
background:#0F172A;
color:#F8FAFC;
padding:30px;
margin:0;
}

/* ---------- TITLE ---------- */

h1{
font-family:'Orbitron',sans-serif;
color:#F97316;
margin-bottom:20px;
}

/* ---------- CONTAINER ---------- */

.container{
background:#1E293B;
padding:25px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* ---------- INPUT ---------- */

input{
width:260px;
padding:10px;
margin:6px;
border-radius:6px;
border:none;
outline:none;
background:#0F172A;
color:white;
border:1px solid #334155;
}

/* ---------- BUTTON ---------- */

button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#F97316;
color:white;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

button:hover{
background:#FB923C;
transform:scale(1.05);
}

/* ---------- LOGOUT ---------- */

.logout{
float:right;
background:#ef4444;
}

.logout:hover{
background:#f87171;
}

/* ---------- EXPORT ---------- */

.export{
background:#F97316;
margin-bottom:10px;
}

.export:hover{
background:#FB923C;
}

/* ---------- TABLE ---------- */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
background:#0F172A;
border-radius:8px;
overflow:hidden;
}

/* ---------- HEADER ---------- */

th{
background:#F97316;
color:white;
padding:12px;
text-align:left;
}

/* ---------- CELLS ---------- */

td{
padding:12px;
border-bottom:1px solid #334155;
}

/* ---------- HOVER ---------- */

tr:hover{
background:#1E293B;
}

/* ---------- MESSAGE ---------- */

#message{
margin-top:10px;
color:#22c55e;
font-weight:500;
}

/* ---------- QR ---------- */

#studentTable div{
background:white;
padding:5px;
border-radius:6px;
display:inline-block;
}

</style>
</head>

<body>

<h1>Admin Panel</h1>
<button class="logout" onclick="logout()">Logout</button>

<!-- REGISTER STUDENT -->

<div class="container">

<h2>Register Student</h2>

<input id="studentID" placeholder="Student ID"><br>
<input id="name" placeholder="Full Name"><br>
<input id="course" placeholder="Course"><br>
<input id="section" placeholder="Year / Section"><br>
<input id="campus" placeholder="Campus"><br>
<input id="email" placeholder="Email"><br>

<button onclick="registerStudent()">Register Student</button>

<p id="message"></p>

</div>


<!-- STUDENT TABLE -->

<div class="container">

<h2>Students</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Section</th>
<th>Campus</th>
<th>QR Code</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</div>


<!-- ATTENDANCE TABLE -->

<div class="container">

<h2>Attendance Records</h2>

<button class="export" onclick="exportExcel()">Export to Excel</button>

<table>

<thead>
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Section</th>
<th>Campus</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
</thead>

<tbody id="attendanceTable"></tbody>

</table>

</div>


<script>

// FIREBASE CONFIG

var firebaseConfig = {
apiKey: "AIzaSyCD-nMiz8I7rbneRDTjPzt3WNbigvV2xDQ",
authDomain: "attsheet-f23a7.firebaseapp.com",
projectId: "attsheet-f23a7",
storageBucket: "attsheet-f23a7.appspot.com",
messagingSenderId: "1039767080370",
appId: "1:1039767080370:web:24e4b0e68f9d30381f68ab"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.firestore();


// REGISTER STUDENT

function registerStudent(){

var studentID=document.getElementById("studentID").value;
var name=document.getElementById("name").value;
var course=document.getElementById("course").value;
var section=document.getElementById("section").value;
var campus=document.getElementById("campus").value;
var email=document.getElementById("email").value;

if(studentID=="" || name==""){
alert("Please fill required fields");
return;
}

db.collection("students").add({

studentID:studentID,
name:name,
course:course,
section:section,
campus:campus,
email:email

})
.then(function(){

document.getElementById("message").innerHTML="Student Registered Successfully";

document.getElementById("studentID").value="";
document.getElementById("name").value="";
document.getElementById("course").value="";
document.getElementById("section").value="";
document.getElementById("campus").value="";
document.getElementById("email").value="";

loadStudents();

});

}


// LOAD STUDENTS

function loadStudents(){

db.collection("students").get().then(function(snapshot){

var table="";

snapshot.forEach(function(doc){

var data=doc.data();

table+=`
<tr>
<td>${data.studentID}</td>
<td>${data.name}</td>
<td>${data.course}</td>
<td>${data.section}</td>
<td>${data.campus}</td>
<td><div id="qr${data.studentID}"></div></td>
</tr>
`;

});

document.getElementById("studentTable").innerHTML=table;

snapshot.forEach(function(doc){

var data=doc.data();

new QRCode(document.getElementById("qr"+data.studentID),{
text:data.studentID,
width:80,
height:80
});

});

});

}

loadStudents();


// REALTIME ATTENDANCE

db.collection("attendance").onSnapshot(function(snapshot){

var table="";

snapshot.forEach(function(doc){

var data=doc.data();

table+=`
<tr>
<td>${data.studentID}</td>
<td>${data.name}</td>
<td>${data.section}</td>
<td>${data.campus}</td>
<td>${data.date}</td>
<td>${data.time}</td>
<td>${data.status}</td>
</tr>
`;

});

document.getElementById("attendanceTable").innerHTML=table;

});


// EXPORT EXCEL

function exportExcel(){

db.collection("attendance").get().then(function(snapshot){

var data=[];

snapshot.forEach(function(doc){

data.push(doc.data());

});

var worksheet = XLSX.utils.json_to_sheet(data);
var workbook = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook,worksheet,"Attendance");

XLSX.writeFile(workbook,"Attendance_Report.xlsx");

});

}


// LOGOUT

function logout(){
firebase.auth().signOut();
}

</script>

</body>
</html>
